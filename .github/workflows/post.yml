name: post-tweets

# 投稿: 承認済み & scheduled_at が到来した投稿だけをXに投稿し、結果をmainへ書き戻す。
#
# 定時起動は外部スケジューラ (cron-job.org) から GitHub API で workflow_dispatch を叩く
# （起動<1秒＝分単位で正確。news-paper リポジトリで実証済みのパターン）。
# GitHub の schedule は混雑時に数時間遅延するため使わない（撤去済み・二重投稿防止も兼ねる）。
# cron-job.org 側: 毎日 9/12/15/18/20/22時 JST に
#   POST https://api.github.com/repos/<owner>/twitter_post/actions/workflows/post.yml/dispatches
#   Headers: Authorization: Bearer <fine-grained PAT (このrepo限定/Actions:RW)>
#            Accept: application/vnd.github+json / X-GitHub-Api-Version: 2022-11-28
#   Body: {"ref":"main"}
# due 判定はスクリプト内部で JST で行うため、発火が数分遅れても投稿は正しく出る。
on:
  workflow_dispatch: {}

permissions:
  contents: write

# 投稿用と指標用ワークフローを直列化し、main への push 競合を防ぐ
concurrency:
  group: x-automation
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Configure git
        run: |
          git config user.name "x-automation-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Post approved & due tweets
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python -m xtools.post_tweet --due-now --no-git
      - name: Commit & push status write-back
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit (no posts went out)."
            exit 0
          fi
          git commit -m "chore(x): record posted tweets"
          git pull --rebase origin main
          git push
